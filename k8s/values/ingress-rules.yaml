ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/use-regex: "true"

services:
  frontend:
    enabled: true
    path: /
    pathType: Prefix
    serviceName: frontend
    port: 80

  gateway:
    enabled: true
    rewrite: true
    path: /api/(.*)
    pathType: ImplementationSpecific
    serviceName: gateway
    port: 8000

  grafana:
    enabled: true
    path: /grafana
    pathType: Prefix
    serviceName: kube-prometheus-stack-grafana
    port: 80

  prometheus:
    enabled: true
    path: /prometheus
    pathType: Prefix
    serviceName: kube-prometheus-stack-prometheus
    port: 9090

  jaeger:
    enabled: true
    path: /jaeger
    pathType: Prefix
    serviceName: jaeger-all-in-one
    port: 16686

  zipkin:
    enabled: true
    path: /zipkin
    pathType: Prefix
    serviceName: zipkin
    port: 9411

  kibana:
    enabled: true
    httpsBackend: true    # Kibana ECK 服务是 HTTPS
    path: /kibana
    pathType: Prefix
    serviceName: eck-stack-eck-kibana-kb-http
    port: 5601

  nacos:
    enabled: true
    rewrite: true
    path: /nacos/(.*)
    pathType: ImplementationSpecific
    serviceName: nacos-cs
    port: 8080

  sentinel:
    enabled: true
    rewrite: true
    path: /sentinel-dashboard(?:/|$)(.*)
    pathType: ImplementationSpecific
    serviceName: sentinel-dashboard
    port: 8080
