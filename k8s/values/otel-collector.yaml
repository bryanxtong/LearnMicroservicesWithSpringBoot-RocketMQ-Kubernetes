mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.147.0"

replicaCount: 1

extraEnvs:
  - name: ELASTICSEARCH_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-es-elastic-user
        key: elastic

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
  metrics-int:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  health-check:
    enabled: true
    containerPort: 13133
    servicePort: 13133
    protocol: TCP
  pprof:
    enabled: true
    containerPort: 1888
    servicePort: 1888
    protocol: TCP
  zpages:
    enabled: true
    containerPort: 55679
    servicePort: 55679
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

  connectors:
    spanmetrics: {}

  exporters:
    debug: {}

    zipkin:
      endpoint: http://zipkin:9411/api/v2/spans
      format: proto

    prometheus:
      endpoint: "0.0.0.0:8889"
      # namespace: ""
      send_timestamps: true
      metric_expiration: 180m
      enable_open_metrics: true
      add_metric_suffixes: false
      resource_to_telemetry_conversion:
        enabled: true

    otlp_grpc:
      endpoint: jaeger-all-in-one:4317
      tls:
        insecure: true

    otlp_http/tempo:
      endpoint: http://tempo:4318

    otlp_http/loki:
      endpoint: http://loki:3100/otlp
      auth:
        authenticator: basicauth/loki

    elasticsearch:
      endpoint: https://elasticsearch-es-http:9200
      auth:
        authenticator: basicauth
      tls:
        insecure_skip_verify: true
      timeout: 30s
      sending_queue:
        enabled: true
        num_consumers: 10
        queue_size: 5000
      retry:
        enabled: true
        initial_interval: 5s
        max_interval: 30s

  processors:
    batch:
      send_batch_size: 1024
      timeout: 10s

  extensions:
    health_check:
      endpoint: ":13133"
    pprof:
      endpoint: ":1888"
    zpages:
      endpoint: ":55679"
    basicauth/loki:
      client_auth:
        username: loki
        password: loki
    basicauth:
      client_auth:
        username: elastic
        password: ${ELASTICSEARCH_PASSWORD}

  service:
    extensions: [pprof, zpages, health_check, basicauth/loki, basicauth]
    pipelines:
      metrics:
        receivers: [otlp, spanmetrics]
        processors: [batch]
        exporters: [debug, prometheus]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug, zipkin, otlp_grpc, otlp_http/tempo, elasticsearch, spanmetrics]
      logs:
        receivers: [otlp]
        exporters: [debug, otlp_http/loki, elasticsearch]
