name: frontend
kind: Deployment
replicaCount: 1

image:
  repository: challenges-frontend
  tag: "1.0"
  pullPolicy: Never

containerPort: 8080

service:
  enabled: true
  type: ClusterIP
  port: 80

ingress:
  enabled: false   # Managed centrally by ingress-rules chart

env:
  - name: SPRING_CLOUD_GATEWAY_HOST
    value: gateway

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Frontend is nginx-based, no Spring Actuator
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false

customLivenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

customReadinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
