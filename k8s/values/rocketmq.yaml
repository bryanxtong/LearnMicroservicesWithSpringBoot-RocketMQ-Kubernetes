nameserver:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
    repository: "apache/rocketmq"
    tag: "5.4.0"

  port: 9876
  heapSize: "512M"

  service:
    type: ClusterIP
    servicePort: 9876

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

broker:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
    repository: "apache/rocketmq"
    tag: "5.4.0"

  partition: 0
  namesrvAddr: "rocketmq-nameserver:9876"

  conf:
    clusterNameOverride: "DefaultCluster"
    brokerNamePrefixOverride: "broker"
    brokerId: 0
    tlsMode: disabled
    heapSize: "2G"
    enableStartupProbe: false
    brokerRole: "ASYNC_MASTER"
    flushDiskType: "ASYNC_FLUSH"
    deleteWhen: "04"
    fileReservedTime: 48

  service:
    port: 10911

  jvmMemory: "-Xms2g -Xmx2g -Xmn1g -XX:MaxDirectMemorySize=1g"

  persistence:
    enabled: true
    size: 10Gi
    storageClass: "standard"

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

proxy:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
    repository: "apache/rocketmq"
    tag: "5.4.0"

  heapSize: "1920M"
  maxDirectMemorySize: "384M"
  rocketMQClusterName: "DefaultCluster"

  config:
    metricCollectorMode: "off"

  service:
    remotingInternetPort: 8080
    grpcPort: 8081
    adminPort: 8088

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

controller:
  nameOverride: "controller"
  replicas: 1
  image:
    registry: docker.io
    repository: "apache/rocketmq"
    tag: "5.4.0"
    pullPolicy: IfNotPresent

  service:
    port: 9878
    internalport: 9888

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    size: 5Gi
    storageClass: "standard"
