provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

fullnameOverride: jaeger-all-in-one

allInOne:
  enabled: true
  image:
    repository: jaegertracing/all-in-one
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

storage:
  type: memory

agent:
  enabled: false

collector:
  enabled: false

query:
  enabled: false

spark:
  enabled: false
