kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kind

containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"

nodes:
  - role: control-plane
    # 关键步骤：将宿主机的配置挂载到容器内
    extraMounts:
      - hostPath: ./kind/containerd-certs.d
        containerPath: /etc/containerd/certs.d
        readOnly: true

    # 端口映射
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
